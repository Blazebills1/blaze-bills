<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blaze Bills</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#050505;
  color:white;
  padding:20px;
  padding-bottom:110px;
}
h1{font-size:42px;margin:35px 0 0;font-weight:900}
h2{font-size:30px;margin:0 0 20px;font-weight:900}
.sub{color:#aaa;font-size:20px;font-weight:800;margin-bottom:30px}
.card{
  background:#141414;
  border:1px solid #333;
  border-radius:28px;
  padding:22px;
  margin-bottom:22px;
}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.box{
  background:#070707;
  border:1px solid #333;
  border-radius:22px;
  padding:18px;
}
.box label{color:#aaa;font-size:15px;font-weight:900}
.box div{font-size:28px;color:#f5d76e;font-weight:900;margin-top:8px}
.green{color:#20d66b!important}
input,select{
  width:100%;
  box-sizing:border-box;
  background:#050505;
  color:white;
  border:1px solid #444;
  border-radius:18px;
  padding:16px;
  font-size:22px;
  font-weight:800;
  margin-bottom:18px;
}
label{font-size:20px;font-weight:900}
button{
  border:0;
  border-radius:20px;
  padding:18px;
  font-size:22px;
  font-weight:900;
}
.gold{background:#e0bd35;color:black;width:100%}
.bill{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin:14px 0;
}
.bill small{color:#aaa;font-size:16px;font-weight:800}
.actions{display:flex;gap:10px}
.darkbtn{background:#333;color:white}
.xbtn{background:#333;color:white}
.nav{
  position:fixed;
  bottom:14px;
  left:14px;
  right:14px;
  background:#141414;
  border:1px solid #333;
  border-radius:26px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  padding:10px;
  gap:8px;
}
.nav button{
  background:transparent;
  color:#aaa;
  font-size:20px;
}
.nav button.active{
  background:#e0bd35;
  color:black;
}
.page{display:none}
.page.active{display:block}
</style>
</head>

<body>

<div id="home" class="page active">
  <h1>Blaze Bills</h1>
  <div class="sub">Simple bill tracker + bank balance</div>

  <div class="card">
    <div class="grid">
      <div class="box">
        <label>Current Balance</label>
        <div id="currentBalance">$0.00</div>
      </div>
      <div class="box">
        <label>Left After Bills</label>
        <div id="leftAfterBills" class="green">$0.00</div>
      </div>
      <div class="box">
        <label>Unpaid Bills</label>
        <div id="unpaidBills">$0.00</div>
      </div>
      <div class="box">
        <label>Due This Week</label>
        <div id="dueThisWeek">$0.00</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Upcoming Bills</h2>
    <div id="upcomingBills">No unpaid bills showing.</div>
  </div>
</div>

<div id="bills" class="page">
  <div class="card">
    <h2>Add Bill</h2>

    <label>Bill Name</label>
    <input id="billName" placeholder="Rent">

    <label>Amount</label>
    <input id="billAmount" type="number" placeholder="2000">

    <label>Due Day</label>
    <input id="billDueDay" type="number" placeholder="1">

    <label>Repeats</label>
    <select id="billRepeat">
      <option>Monthly</option>
      <option>Biweekly</option>
      <option>Weekly</option>
      <option>One Time</option>
    </select>

    <button class="gold" onclick="addBill()">Add Bill</button>
  </div>

  <div class="card">
    <h2>All Bills</h2>
    <div id="allBills">No bills added yet.</div>
  </div>
</div>

<div id="bank" class="page">
  <div class="card">
    <h2>Bank Balance</h2>
    <label>Current Bank Balance</label>
    <input id="bankBalanceInput" type="number" placeholder="7000">
    <button class="gold" onclick="saveBankBalance()">Save Balance</button>
  </div>
</div>

<div id="settings" class="page">
  <div class="card">
    <h2>Settings</h2>
    <button class="gold" onclick="resetApp()">Reset All Data</button>
  </div>
</div>

<div class="nav">
  <button id="navHome" class="active" onclick="showPage('home')">Home</button>
  <button id="navBills" onclick="showPage('bills')">Bills</button>
  <button id="navBank" onclick="showPage('bank')">Bank</button>
  <button id="navSettings" onclick="showPage('settings')">Settings</button>
</div>

<script>
let bills = JSON.parse(localStorage.getItem("blazeBills")) || [];
let bankBalance = Number(localStorage.getItem("blazeBankBalance")) || 0;

function money(num){
  return "$" + Number(num || 0).toLocaleString(undefined,{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  });
}

function saveData(){
  localStorage.setItem("blazeBills", JSON.stringify(bills));
  localStorage.setItem("blazeBankBalance", bankBalance);
}

function showPage(page){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");

  document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
  document.getElementById("nav" + page.charAt(0).toUpperCase() + page.slice(1)).classList.add("active");

  render();
}

function addBill(){
  const name = document.getElementById("billName").value.trim();
  const amount = Number(document.getElementById("billAmount").value);
  const dueDay = Number(document.getElementById("billDueDay").value);
  const repeat = document.getElementById("billRepeat").value;

  if(!name || !amount || !dueDay){
    alert("Please enter bill name, amount, and due day.");
    return;
  }

  bills.push({
    id: Date.now(),
    name,
    amount,
    dueDay,
    repeat,
    paid:false
  });

  document.getElementById("billName").value = "";
  document.getElementById("billAmount").value = "";
  document.getElementById("billDueDay").value = "";
  document.getElementById("billRepeat").value = "Monthly";

  saveData();
  render();
}

function togglePaid(id){
  bills = bills.map(b => b.id === id ? {...b, paid: !b.paid} : b);
  saveData();
  render();
}

function deleteBill(id){
  bills = bills.filter(b => b.id !== id);
  saveData();
  render();
}

function saveBankBalance(){
  bankBalance = Number(document.getElementById("bankBalanceInput").value) || 0;
  saveData();
  render();
  alert("Bank balance saved.");
}

function render(){
  document.getElementById("bankBalanceInput").value = bankBalance || "";

  const unpaid = bills.filter(b => !b.paid);
  const unpaidTotal = unpaid.reduce((sum,b) => sum + Number(b.amount), 0);

  const today = new Date();
  const todayDay = today.getDate();
  const weekEnd = todayDay + 7;

  const dueWeekTotal = unpaid
    .filter(b => b.dueDay >= todayDay && b.dueDay <= weekEnd)
    .reduce((sum,b) => sum + Number(b.amount), 0);

  document.getElementById("currentBalance").innerText = money(bankBalance);
  document.getElementById("unpaidBills").innerText = money(unpaidTotal);
  document.getElementById("leftAfterBills").innerText = money(bankBalance - unpaidTotal);
  document.getElementById("dueThisWeek").innerText = money(dueWeekTotal);

  const upcomingBox = document.getElementById("upcomingBills");
  if(unpaid.length === 0){
    upcomingBox.innerHTML = "No unpaid bills showing.";
  } else {
    upcomingBox.innerHTML = unpaid
      .sort((a,b) => a.dueDay - b.dueDay)
      .map(b => `
        <div>
          <b>${b.name}</b><br>
          <small>${money(b.amount)} • ${b.repeat} • Due Day ${b.dueDay}</small>
        </div><br>
      `).join("");
  }

  const allBills = document.getElementById("allBills");
  if(bills.length === 0){
    allBills.innerHTML = "No bills added yet.";
  } else {
    allBills.innerHTML = bills
      .sort((a,b) => a.dueDay - b.dueDay)
      .map(b => `
        <div class="bill">
          <div>
            <b>${b.name} ${b.paid ? "✅" : ""}</b><br>
            <small>${money(b.amount)} • ${b.repeat}<br>Due Day ${b.dueDay}</small>
          </div>
          <div class="actions">
            <button class="darkbtn" onclick="togglePaid(${b.id})">${b.paid ? "Undo" : "Paid"}</button>
            <button class="xbtn" onclick="deleteBill(${b.id})">X</button>
          </div>
        </div>
      `).join("");
  }
}

function resetApp(){
  if(confirm("Delete all bills and balance?")){
    bills = [];
    bankBalance = 0;
    saveData();
    render();
  }
}

render();
</script>

</body>
</html>
