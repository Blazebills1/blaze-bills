<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Blaze Bills" />
  <title>Blaze Bills</title>
  <style>
    :root { --bg:#0f172a; --card:#1f2937; --text:#f9fafb; --muted:#9ca3af; --line:#374151; --good:#22c55e; --warn:#f59e0b; --bad:#ef4444; --btn:#2563eb; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:linear-gradient(180deg,#0f172a,#111827); color:var(--text); padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom); }
    header { padding:20px 4px 10px; display:flex; align-items:center; justify-content:space-between; }
    h1 { margin:0; font-size:30px; letter-spacing:-.5px; }
    h2 { margin-top:0; }
    .tag,.small { color:var(--muted); font-size:13px; line-height:1.4; }
    .card { background:rgba(31,41,55,.9); border:1px solid rgba(255,255,255,.08); border-radius:20px; padding:16px; margin:12px 0; box-shadow:0 8px 22px rgba(0,0,0,.22); }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .metric { background:rgba(17,24,39,.9); border:1px solid var(--line); border-radius:16px; padding:14px; }
    .metric label { display:block; color:var(--muted); font-size:12px; margin-bottom:5px; }
    .metric strong { font-size:22px; }
    .good { color:var(--good); } .bad { color:var(--bad); } .warn { color:var(--warn); }
    nav { position:sticky; bottom:10px; display:grid; grid-template-columns:repeat(4,1fr); gap:8px; background:rgba(15,23,42,.92); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.08); padding:8px; border-radius:22px; margin-top:18px; }
    nav button { border:0; border-radius:16px; padding:10px 4px; background:transparent; color:var(--muted); font-size:12px; }
    nav button.active { background:var(--btn); color:white; }
    button,input,select { font:inherit; }
    .primary { width:100%; border:0; border-radius:16px; padding:14px; background:var(--btn); color:white; font-weight:700; margin-top:10px; }
    .secondary { border:1px solid var(--line); border-radius:14px; padding:10px 12px; background:#111827; color:white; margin:2px; }
    .danger { background:#7f1d1d; }
    input,select { width:100%; background:#0b1220; color:white; border:1px solid var(--line); border-radius:14px; padding:13px; margin:6px 0 12px; }
    label { color:var(--muted); font-size:13px; }
    .bill { display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; border-bottom:1px solid rgba(255,255,255,.07); padding:12px 0; }
    .bill:last-child { border-bottom:0; }
    .bill-title { font-weight:700; font-size:16px; }
    .bill-sub { color:var(--muted); font-size:13px; margin-top:3px; }
    .pill { display:inline-block; padding:4px 8px; border-radius:999px; font-size:12px; margin-left:6px; background:#374151; color:#d1d5db; }
    .paid { background:rgba(34,197,94,.15); color:#86efac; }
    .due { background:rgba(239,68,68,.15); color:#fca5a5; }
    .soon { background:rgba(245,158,11,.15); color:#fcd34d; }
    .hide { display:none; }
    .row { display:flex; gap:8px; }
    .row>* { flex:1; }
  </style>
</head>
<body>
  <header><div><h1>Blaze Bills</h1><div class="tag">Simple bill tracker + bank balance</div></div><div id="todayText" class="tag"></div></header>
  <main>
    <section id="dashboard">
      <div class="card"><div class="grid">
        <div class="metric"><label>Current Balance</label><strong id="mBalance">$0</strong></div>
        <div class="metric"><label>Left After Bills</label><strong id="mLeft">$0</strong></div>
        <div class="metric"><label>Unpaid Bills</label><strong id="mUnpaid">$0</strong></div>
        <div class="metric"><label>Due This Week</label><strong id="mWeek">$0</strong></div>
      </div></div>
      <div class="card"><h2>Upcoming Bills</h2><div id="upcomingList"></div></div>
    </section>
    <section id="bills" class="hide">
      <div class="card"><h2>Add Bill</h2>
        <label>Bill Name</label><input id="billName" placeholder="Rent, Electric, Truck Note" />
        <div class="row"><div><label>Amount</label><input id="billAmount" type="number" inputmode="decimal" placeholder="2000" /></div><div><label>Due Day</label><input id="billDay" type="number" inputmode="numeric" min="1" max="31" placeholder="1" /></div></div>
        <label>Repeats</label><select id="billRepeat"><option value="monthly">Monthly</option><option value="weekly">Weekly</option><option value="yearly">Yearly</option></select>
        <button class="primary" onclick="addBill()">Add Bill</button>
      </div>
      <div class="card"><h2>All Bills</h2><div id="billList"></div></div>
    </section>
    <section id="bank" class="hide">
      <div class="card"><h2>Simple Bank Balance</h2>
        <label>Current Bank Balance</label><input id="bankBalance" type="number" inputmode="decimal" />
        <label>Expected Income Before Month Ends</label><input id="bankIncome" type="number" inputmode="decimal" />
        <label>Keep This Cushion</label><input id="bankCushion" type="number" inputmode="decimal" />
        <button class="primary" onclick="saveBank()">Save Bank Info</button>
      </div>
      <div class="card"><h2>Can I Buy It?</h2><label>Purchase Amount</label><input id="buyAmount" type="number" inputmode="decimal" placeholder="175" /><button class="primary" onclick="canIBuy()">Check</button><p id="buyResult" class="small"></p></div>
    </section>
    <section id="settings" class="hide">
      <div class="card"><h2>Backup</h2><p class="small">Export saves a backup of your bills. Import restores it.</p><button class="primary" onclick="exportData()">Export Backup</button><input id="importFile" type="file" accept="application/json" onchange="importData(event)" /><button class="primary danger" onclick="resetAll()">Reset Everything</button></div>
    </section>
  </main>
  <nav><button class="active" onclick="show('dashboard',this)">Home</button><button onclick="show('bills',this)">Bills</button><button onclick="show('bank',this)">Bank</button><button onclick="show('settings',this)">Settings</button></nav>
<script>
const $=id=>document.getElementById(id), key='blazeBillsV1';
let data=JSON.parse(localStorage.getItem(key)||'{"bills":[],"bank":{"balance":0,"income":0,"cushion":0}}');
function money(n){return (Number(n)||0).toLocaleString(undefined,{style:'currency',currency:'USD'});}
function save(){localStorage.setItem(key,JSON.stringify(data));render();}
function dueDate(day){const now=new Date();return new Date(now.getFullYear(),now.getMonth(),Math.min(Number(day)||1,new Date(now.getFullYear(),now.getMonth()+1,0).getDate()));}
function daysUntil(d){return Math.ceil((d-new Date(new Date().toDateString()))/86400000);}
function statusFor(b){if(b.paid)return '<span class="pill paid">Paid</span>'; const days=daysUntil(dueDate(b.day)); if(days<0)return '<span class="pill due">Overdue</span>'; if(days<=7)return '<span class="pill soon">Due Soon</span>'; return '<span class="pill">Upcoming</span>';}
function unpaidTotal(){return data.bills.filter(b=>!b.paid).reduce((s,b)=>s+Number(b.amount||0),0);}
function dueThisWeek(){return data.bills.filter(b=>!b.paid&&daysUntil(dueDate(b.day))<=7&&daysUntil(dueDate(b.day))>=0).reduce((s,b)=>s+Number(b.amount||0),0);}
function projected(){return Number(data.bank.balance||0)+Number(data.bank.income||0)-unpaidTotal()-Number(data.bank.cushion||0);}
function render(){
 $('todayText').textContent=new Date().toLocaleDateString(undefined,{month:'short',day:'numeric'});
 $('mBalance').textContent=money(data.bank.balance); $('mUnpaid').textContent=money(unpaidTotal()); $('mWeek').textContent=money(dueThisWeek()); $('mLeft').textContent=money(projected()); $('mLeft').className=projected()>=0?'good':'bad';
 $('bankBalance').value=data.bank.balance||''; $('bankIncome').value=data.bank.income||''; $('bankCushion').value=data.bank.cushion||'';
 const sorted=[...data.bills].sort((a,b)=>Number(a.day)-Number(b.day));
 const list=sorted.map(b=>`<div class="bill"><div><div class="bill-title">${b.name} ${statusFor(b)}</div><div class="bill-sub">Due ${dueDate(b.day).toLocaleDateString(undefined,{month:'short',day:'numeric'})} • ${money(b.amount)}</div></div><div><button class="secondary" onclick="togglePaid('${b.id}')">${b.paid?'Undo':'Paid'}</button><button class="secondary" onclick="deleteBill('${b.id}')">Delete</button></div></div>`).join('')||'<p class="small">No bills yet. Add your first bill on the Bills tab.</p>';
 $('billList').innerHTML=list;
 $('upcomingList').innerHTML=sorted.filter(b=>!b.paid).slice(0,6).map(b=>`<div class="bill"><div><div class="bill-title">${b.name} ${statusFor(b)}</div><div class="bill-sub">${money(b.amount)} due ${dueDate(b.day).toLocaleDateString(undefined,{month:'short',day:'numeric'})}</div></div><button class="secondary" onclick="togglePaid('${b.id}')">Paid</button></div>`).join('')||'<p class="small">No unpaid bills showing.</p>';
}
function show(id,btn){document.querySelectorAll('main section').forEach(s=>s.classList.add('hide'));$(id).classList.remove('hide');document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function addBill(){const name=$('billName').value.trim(),amount=Number($('billAmount').value),day=Number($('billDay').value); if(!name||!amount||!day){alert('Enter bill name, amount, and due day.');return;} data.bills.push({id:String(Date.now()+Math.random()),name,amount,day,repeat:$('billRepeat').value,paid:false}); $('billName').value='';$('billAmount').value='';$('billDay').value='';save();}
function togglePaid(id){const b=data.bills.find(x=>x.id===id); if(b){b.paid=!b.paid;save();}}
function deleteBill(id){if(confirm('Delete this bill?')){data.bills=data.bills.filter(b=>b.id!==id);save();}}
function saveBank(){data.bank.balance=Number($('bankBalance').value||0);data.bank.income=Number($('bankIncome').value||0);data.bank.cushion=Number($('bankCushion').value||0);save();}
function canIBuy(){const amt=Number($('buyAmount').value||0), after=projected()-amt; $('buyResult').textContent=after>=0?`Yes. After that purchase, you should still have ${money(after)} left after unpaid bills and cushion.`:`Be careful. That would put you ${money(Math.abs(after))} short after unpaid bills and cushion.`; $('buyResult').className=after>=0?'small good':'small bad';}
function exportData(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='blaze-bills-backup.json';a.click();}
function importData(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{data=JSON.parse(r.result);save();};r.readAsText(file);}
function resetAll(){if(confirm('This deletes all Blaze Bills data on this device. Continue?')){localStorage.removeItem(key);data={bills:[],bank:{balance:0,income:0,cushion:0}};render();}}
render();
</script>
</body>
</html>
